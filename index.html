    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --coffee-black: #1a1a1a;
            --espresso-brown: #4B3621;
            --dark-brown: #2C1810;
            --cream-beige: #F5F0E1;
            --light-cream: #FAF7F0;
            --muted-tan: #C2A378;
            --deep-maroon: #800000;
            --bright-maroon: #A00000;
            --gold: #D4A853;
            --white: #ffffff;
            --gray-light: #f5f5f5;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.15);
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--light-cream);
            color: var(--coffee-black);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            border: none;
            outline: none;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section {
            padding: 80px 0;
        }

        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 1rem;
            color: var(--deep-maroon);
        }

        .section-subtitle {
            text-align: center;
            color: var(--espresso-brown);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(250, 247, 240, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--deep-maroon);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            font-weight: 500;
            color: var(--espresso-brown);
            transition: color 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--deep-maroon);
        }

        .nav-cart-btn {
            background: var(--deep-maroon);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .nav-cart-btn:hover {
            background: var(--bright-maroon);
        }

        .cart-badge {
            background: var(--gold);
            color: var(--coffee-black);
            padding: 2px 8px;
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            font-size: 1.5rem;
            color: var(--espresso-brown);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, var(--light-cream) 0%, var(--cream-beige) 100%);
            overflow: hidden;
            padding-top: 80px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: var(--deep-maroon);
            border-radius: 50%;
            opacity: 0.05;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: var(--muted-tan);
            border-radius: 50%;
            opacity: 0.1;
        }

        .hero .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--coffee-black);
        }

        .hero-content h1 span {
            color: var(--deep-maroon);
        }

        .hero-content p {
            font-size: 1.2rem;
            color: var(--espresso-brown);
            margin-bottom: 2rem;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--deep-maroon);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--bright-maroon);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--deep-maroon);
            border: 2px solid var(--deep-maroon);
        }

        .btn-secondary:hover {
            background: var(--deep-maroon);
            color: var(--white);
        }

        .hero-image {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image img {
            width: 450px;
            height: 450px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: var(--shadow-lg);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .hero-stats {
            display: flex;
            gap: 40px;
            margin-top: 40px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--deep-maroon);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--espresso-brown);
        }

        /* ===== MENU SECTION ===== */
        .menu {
            background: var(--white);
        }

        .menu-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .menu-tab {
            padding: 12px 25px;
            background: var(--light-cream);
            border: 2px solid var(--muted-tan);
            border-radius: 25px;
            font-weight: 600;
            color: var(--espresso-brown);
            transition: all 0.3s;
        }

        .menu-tab:hover,
        .menu-tab.active {
            background: var(--deep-maroon);
            border-color: var(--deep-maroon);
            color: var(--white);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .menu-item {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .menu-item-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--gray-light);
        }

        .menu-item-content {
            padding: 20px;
        }

        .menu-item-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--coffee-black);
        }

        .menu-item-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--deep-maroon);
            margin-bottom: 15px;
        }

        .menu-item-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--light-cream);
            border: 2px solid var(--muted-tan);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--espresso-brown);
            transition: all 0.3s;
        }

        .qty-btn:hover {
            background: var(--deep-maroon);
            border-color: var(--deep-maroon);
            color: var(--white);
        }

        .qty-value {
            font-weight: 700;
            font-size: 1.1rem;
            min-width: 30px;
            text-align: center;
        }

        .add-to-cart-btn {
            padding: 10px 20px;
            background: var(--deep-maroon);
            color: var(--white);
            border-radius: 20px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-to-cart-btn:hover {
            background: var(--bright-maroon);
        }

        .add-to-cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .menu-item-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--gold);
            color: var(--coffee-black);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            z-index: 2;
        }

        .sold-out-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--deep-maroon);
            color: var(--white);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            z-index: 2;
        }

        .menu-item.sold-out {
            opacity: 0.8;
        }

        .menu-item.sold-out img {
            filter: grayscale(0.5);
        }

        /* ===== CART PANEL ===== */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .cart-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .cart-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            max-width: 100%;
            height: 100vh;
            background: var(--white);
            z-index: 2001;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        .cart-panel.active {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 1.5rem;
            color: var(--deep-maroon);
        }

        .close-cart {
            background: none;
            font-size: 1.5rem;
            color: var(--espresso-brown);
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--gray-light);
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: var(--deep-maroon);
            font-weight: 700;
        }

        .cart-item-total {
            font-size: 0.9rem;
            color: var(--espresso-brown);
        }
